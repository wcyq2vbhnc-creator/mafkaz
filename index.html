<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFKAZ</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #e50914;
            text-shadow: 0 0 10px #e50914, 0 0 20px #e50914;
            letter-spacing: 5px;
        }
        .subtitle {
            color: #8c8c8c;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .btn {
            background: linear-gradient(135deg, #e50914, #9b0000);
            color: white;
            border: none;
            padding: 15px 0;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            transition: 0.3s;
        }
        .btn-secondary {
            background: #1f2833;
            border: 1px solid #e50914;
            box-shadow: none;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #45f3ff;
            text-shadow: 0 0 5px #45f3ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MAFKAZ</h1>
        <div class="subtitle">Қазақша мафия ойыны</div>

        <button class="btn">ОЙЫНДЫ БАСТАУ</button>
        <button class="btn btn-secondary">БӨЛМЕ ҚҰРУ</button>
        <button class="btn btn-secondary">БӨЛМЕГЕ КІРУ</button>
        <button class="btn btn-secondary">ПАРАМЕТРЛЕР</button>

        <div class="footer">RANK: ЖАС МАФИЯ</div>
    </div>

</body>
</html>
